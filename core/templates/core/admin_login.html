{% extends 'core/base.html' %}

{% block title %}Admin Authentication - TechWise{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-20 bg-slate-50/50">
    <div class="max-w-md w-full">
        <!-- Brand Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 rounded-3xl shadow-xl shadow-slate-200 text-white mb-6">
                <i data-lucide="shield-check" size="32"></i>
            </div>
            <h1 class="text-3xl font-900 text-slate-900 tracking-tight">Admin Gateway</h1>
            <p class="text-slate-500 font-medium mt-2">Authorized diagnostic access only</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
            <!-- Decorative Accent -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-slate-900 to-slate-700"></div>

            <form id="admin-login-form" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Admin Identity</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                required 
                                class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all placeholder:text-slate-300 font-medium" 
                                placeholder="Username or Email"
                            >
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Access Token</label>
                        <div class="relative">
                            <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size="18"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                required 
                                class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all placeholder:text-slate-300 font-medium" 
                                placeholder="••••••••"
                            >
                        </div>
                    </div>
                </div>

                <div id="error-message" class="hidden animate-in fade-in slide-in-from-top-2">
                    <div class="bg-red-50 text-red-600 text-xs font-bold p-4 rounded-2xl border border-red-100 flex items-center gap-3">
                        <i data-lucide="alert-circle" size="16"></i>
                        <span id="error-text">Request Denied</span>
                    </div>
                </div>

                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-slate-800 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group"
                >
                    <span>Establish Connection</span>
                    <i data-lucide="arrow-right" class="group-hover:translate-x-1 transition-transform" size="18"></i>
                </button>
            </form>
        </div>

        <!-- Footer Links -->
        <div class="mt-8 text-center flex flex-col gap-4">
            <a href="{% url 'login' %}" class="text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="user" size="14"></i>
                Standard User Login
            </a>
            <a href="{% url 'home' %}" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="chevron-left" size="14"></i>
                Public Website
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        
        btn.disabled = true;
        btn.innerHTML = '<span>Verifying Access...</span>';
        errorMsg.classList.add('hidden');

        const formData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                // IMPORTANT: Update localStorage for navbar compatibility
                // We don't have the user object here immediately in the legacy response, 
                // but we can simulate it or fetch it. For now, we'll set a generic admin flag.
                localStorage.setItem('techwise_user', JSON.stringify({
                    name: 'Administrator',
                    email: formData.username,
                    isLoggedIn: true,
                    isAdmin: true
                }));

                btn.innerHTML = '<span>Identity Confirmed</span>';
                btn.classList.replace('bg-slate-900', 'bg-green-500');
                
                const urlParams = new URLSearchParams(window.location.search);
                const nextUrl = urlParams.get('next');
                setTimeout(() => {
                    window.location.href = nextUrl || "{% url 'admin_dashboard' %}";
                }, 500);
            } else {
                throw new Error(result.message || 'Access Denied');
            }
        } catch (error) {
            errorText.textContent = error.message;
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<span>Establish Connection</span><i data-lucide="arrow-right" class="group-hover:translate-x-1 transition-transform" size="18"></i>';
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
