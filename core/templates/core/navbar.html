<script>
    function updateAuthUI() {
        const userStr = localStorage.getItem('techwise_user');
        let user = null;
        try {
            user = userStr ? JSON.parse(userStr) : null;
        } catch (e) {
            console.error("Error parsing user session:", e);
        }

        const isLoggedIn = !!(user && user.isLoggedIn);

        const loginLinks = [document.getElementById('login-link'), document.getElementById('mobile-login-link')];
        const registerLinks = [document.getElementById('register-link'), document.getElementById('mobile-register-link')];
        const logoutBtns = [document.getElementById('logout-btn'), document.getElementById('mobile-logout-btn')];
        const dashboardLinks = [document.getElementById('dashboard-link'), document.getElementById('mobile-dashboard-link')];
        const userDisplay = document.getElementById('user-display');
        const cartNav = document.getElementById('cart-nav');

        if (isLoggedIn) {
            loginLinks.forEach(el => { if (el) el.style.setProperty('display', 'none', 'important'); });
            registerLinks.forEach(el => { if (el) el.style.setProperty('display', 'none', 'important'); });
            logoutBtns.forEach(el => { if (el) el.style.setProperty('display', 'flex', 'important'); });
            
            if (cartNav) cartNav.style.setProperty('display', 'block', 'important');
            
            // Hide dashboard if admin
            const isAdmin = user.isSuperuser || user.isAdmin;
            dashboardLinks.forEach(el => { 
                if (el) {
                    el.style.setProperty('display', isAdmin ? 'none' : 'flex', 'important');
                }
            });
            
            if (userDisplay) {
                userDisplay.textContent = user.name || user.email;
                userDisplay.style.setProperty('display', 'inline', 'important');
            }
        } else {
            loginLinks.forEach(el => { if (el) el.style.setProperty('display', 'flex', 'important'); });
            registerLinks.forEach(el => { if (el) el.style.setProperty('display', 'flex', 'important'); });
            logoutBtns.forEach(el => { if (el) el.style.setProperty('display', 'none', 'important'); });
            dashboardLinks.forEach(el => { if (el) el.style.setProperty('display', 'none', 'important'); });
            if (cartNav) cartNav.style.setProperty('display', 'none', 'important');
            if (userDisplay) {
                userDisplay.textContent = '';
                userDisplay.style.setProperty('display', 'none', 'important');
            }
        }
    }

    function handleLogout() {
        localStorage.removeItem('techwise_user');
        window.location.href = "{% url 'logout' %}";
    }

    const logoutBtn = document.getElementById('logout-btn');
    const mobileLogoutBtn = document.getElementById('mobile-logout-btn');

    if (logoutBtn) logoutBtn.onclick = handleLogout;
    if (mobileLogoutBtn) mobileLogoutBtn.onclick = handleLogout;

    // Run on every page load
    updateAuthUI();
    window.onload = updateAuthUI;
    document.addEventListener('DOMContentLoaded', updateAuthUI);

    document.getElementById('menu-btn').addEventListener('click', function () {
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');
        menu.classList.toggle('hidden');
        if (menu.classList.contains('hidden')) {
            icon.setAttribute('data-lucide', 'menu');
        } else {
            icon.setAttribute('data-lucide', 'x');
        }
        lucide.createIcons();
    });
</script>
