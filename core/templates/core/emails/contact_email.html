<!DOCTYPE html>
<html>
<head>
    <style>
        .email-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            color: #1a202c;
            background-color: #ffffff;
        }
        .header {
            background-color: #0f172a;
            color: white;
            padding: 32px;
            text-align: center;
        }
        .content {
            padding: 40px;
        }
        .field-box {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
        }
        .label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            display: block;
        }
        .value {
            font-size: 16px;
            color: #1e293b;
        }
        .footer {
            background-color: #f1f5f9;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1 style="margin:0;">TECHWISE</h1>
            <p style="margin:8px 0 0 0; opacity: 0.8;">New Contact Form Submission</p>
        </div>
        <div class="content">
            <div class="field-box">
                <span class="label">From</span>
                <div class="value"><strong>{{ name }}</strong> ({{ email }})</div>
            </div>
            <div class="field-box">
                <span class="label">Subject</span>
                <div class="value">{{ subject }}</div>
            </div>
            <div class="field-box">
                <span class="label">Message Content</span>
                <div class="value" style="white-space: pre-wrap;">{{ message }}</div>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 TechWise Laptop Sales & Rentals. All rights reserved.
        </div>
    </div>
</body>
</html>
